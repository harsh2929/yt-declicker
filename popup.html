<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=360">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">

  <header class="header">
    <div class="brand">
      <div class="brand-icon">&#9000;</div>
      <div class="brand-text">
        <h1>DECLICKER</h1>
        <span class="brand-sub">kill keyboard noise</span>
      </div>
    </div>
    <div class="header-controls">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">&#9728;</button>
      <div class="status-badge" id="status">OFF</div>
    </div>
  </header>

  <div class="update-banner" id="updateBanner" style="display:none">
    <span class="update-text" id="updateText">Update available</span>
    <a class="update-link" id="updateLink" href="#" target="_blank" rel="noopener noreferrer">GET IT ↗</a>
    <button class="update-dismiss" id="updateDismiss" aria-label="Dismiss">✕</button>
  </div>

  <div class="inject-row" id="injectRow" style="display:none">
    <button class="btn btn-inject" id="injectBtn">INJECT &amp; RETRY</button>
  </div>

  <div class="power-row">
    <span class="power-label">Power</span>
    <button class="power-btn" id="toggle">OFF</button>
  </div>

  <div class="section">
    <div class="section-label">Engine</div>
    <div class="engine-grid">

      <button class="engine-card active" data-mode="eq">
        <div class="engine-header">
          <div class="engine-identity">
            <div class="engine-name">EQ Lite</div>
            <div class="engine-tag">LITE</div>
          </div>
          <div class="engine-best-for">Best for: casual viewers</div>
        </div>
        <div class="engine-desc">Multi-band notch filters + compressor targeting click frequencies. Zero download, works instantly.</div>
        <div class="engine-stats">
          <div class="stat-row">
            <span class="stat-label">&#9889; Speed</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--accent);--target:100%"></div></div>
            <span class="stat-val">Instant</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">&#127919; Noise removal</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--accent);--target:68%"></div></div>
            <span class="stat-val">Good</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">&#128267; Battery</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--accent);--target:96%"></div></div>
            <span class="stat-val">Tiny</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">&#128230; Setup</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--accent);--target:100%"></div></div>
            <span class="stat-val">None</span>
          </div>
        </div>
      </button>

      <button class="engine-card" data-mode="ml">
        <div class="engine-header">
          <div class="engine-identity">
            <div class="engine-name">RNNoise</div>
            <div class="engine-tag tag-ml">ML</div>
          </div>
          <div class="engine-best-for">Best for: broader noise</div>
        </div>
        <div class="engine-desc">Mozilla&apos;s 150 KB neural net, already bundled. Catches fan hum, room noise, and typing — not just clicks.</div>
        <div class="engine-stats">
          <div class="stat-row">
            <span class="stat-label">&#9889; Speed</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--ml-accent);--target:88%"></div></div>
            <span class="stat-val">Fast</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">&#127919; Noise removal</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--ml-accent);--target:84%"></div></div>
            <span class="stat-val">Great</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">&#128267; Battery</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--ml-accent);--target:74%"></div></div>
            <span class="stat-val">Light</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">&#128230; Setup</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--ml-accent);--target:95%"></div></div>
            <span class="stat-val">None</span>
          </div>
        </div>
      </button>

      <button class="engine-card" data-mode="deep">
        <div class="engine-header">
          <div class="engine-identity">
            <div class="engine-name">DeepFilter</div>
            <div class="engine-tag tag-deep">DL</div>
          </div>
          <div class="engine-best-for">Best for: audiophiles</div>
        </div>
        <div class="engine-desc">DeepFilterNet3 deep-learning model (~2 MB, one-time download). Maximum possible clarity — state of the art.</div>
        <div class="engine-stats">
          <div class="stat-row">
            <span class="stat-label">&#9889; Speed</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--deep-accent);--target:72%"></div></div>
            <span class="stat-val">Quick</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">&#127919; Noise removal</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--deep-accent);--target:100%"></div></div>
            <span class="stat-val">MAX</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">&#128267; Battery</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--deep-accent);--target:50%"></div></div>
            <span class="stat-val">Med</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">&#128230; Setup</span>
            <div class="stat-track"><div class="stat-fill" style="--bar:var(--deep-accent);--target:65%"></div></div>
            <span class="stat-val">1 DL</span>
          </div>
        </div>
      </button>

    </div>
  </div>

  <div class="df-panel" id="dfPanel">
    <div class="df-row">
      <span class="df-icon" id="dfIcon">&#9675;</span>
      <span class="df-text" id="dfText">Model not downloaded</span>
      <span class="df-size">~2 MB</span>
    </div>
    <div class="df-progress" id="dfProgress">
      <div class="df-progress-label" id="dfProgressLabel">Downloading WASM...</div>
      <div class="df-bar">
        <div class="df-bar-fill" id="dfBarFill"></div>
      </div>
    </div>
    <button class="btn btn-download" id="dfBtn">DOWNLOAD MODEL</button>
    <button class="btn btn-delete" id="dfDeleteBtn">DELETE MODEL</button>
  </div>

  <div class="section">
    <div class="section-label" id="intensityLabel">Intensity</div>
    <div class="range-row">
      <input type="range" id="intensity" min="0" max="100" value="70">
      <span class="range-val" id="intensityVal">70</span>
    </div>
  </div>

  <div class="presets-section" id="eqPresets">
    <div class="section-label">Presets</div>
    <div class="preset-row">
      <button class="btn btn-preset" data-val="30">LIGHT</button>
      <button class="btn btn-preset" data-val="60">MED</button>
      <button class="btn btn-preset active" data-val="85">HEAVY</button>
      <button class="btn btn-preset" data-val="100">NUKE</button>
    </div>
  </div>

  <!-- Channel rules -->
  <div class="channels-section" id="channelsSection">
    <button class="channels-header" id="channelsHeaderBtn" aria-expanded="false">
      <span class="section-label">📺&nbsp; CHANNELS</span>
      <span class="channels-caret" id="channelsCaret">›</span>
    </button>
    <div class="channels-body" id="channelsBody">
      <!-- current-channel row (populated by JS when on YouTube) -->
      <div id="chCurrentWrap" style="display:none"></div>
      <!-- saved channel list (populated by JS) -->
      <div id="chList"></div>
      <p class="ch-empty" id="chEmpty" style="display:none">
        No channels saved yet.<br>
        Open a YouTube video to set a rule.
      </p>
    </div>
  </div>

  <!-- Auto-detect clicky videos -->
  <div class="detect-section">
    <div class="detect-header">
      <span class="section-label">⌨&nbsp; AUTO-DETECT</span>
      <button class="detect-toggle on" id="detectToggle" aria-pressed="true">ON</button>
    </div>
    <div class="detect-keywords" id="detectKeywords">
      <textarea
        id="customKeywords"
        placeholder="Add your own keywords, comma-separated…&#10;e.g. rust live, react coding session"
        rows="2"
        spellcheck="false"
      ></textarea>
    </div>
  </div>

  <footer class="footer">
    <div id="infoText">Targets 1&ndash;6 kHz click transients. Voice stays clean.</div>
    <button class="bug-report-btn" id="bugReportBtn">&#128027; Report a bug</button>
  </footer>

</div>
<script src="popup.js"></script>
</body>
</html>
